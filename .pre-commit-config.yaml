repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        types_or: [rust]

      - id: cargo-audit
        name: cargo audit
        entry: cargo audit --deny warnings --ignore RUSTSEC-2023-0071
        language: system
        pass_filenames: false
        files: ^Cargo\.(toml|lock)$
        stages: [pre-push]

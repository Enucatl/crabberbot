name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/enucatl/crabberbot

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get version from git
        id: version
        run: |
          VERSION=$(git describe --long | sed 's/-/\./')
          echo "Detected version: $VERSION"
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Get yt-dlp latest commit hash
        id: yt_dlp
        run: |
          HASH=$(git ls-remote https://github.com/Enucatl/yt-dlp.git refs/heads/master | cut -f1)
          echo "commit_hash=$HASH" >> $GITHUB_OUTPUT

      - name: Run cargo test
        run: cargo test --verbose

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-,format=short

      - name: Build Docker image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: crabberbot:scan
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CARGO_PACKAGE_VERSION=${{ steps.version.outputs.value }}
            YT_DLP_COMMIT_HASH=${{ steps.yt_dlp.outputs.commit_hash }}
          cache-from: type=gha

      - name: Scan repository config with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          scanners: config,secret
          severity: CRITICAL,HIGH

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: crabberbot:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,secret
          severity: CRITICAL,HIGH

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: crabberbot:scan
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CARGO_PACKAGE_VERSION=${{ steps.version.outputs.value }}
            YT_DLP_COMMIT_HASH=${{ steps.yt_dlp.outputs.commit_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

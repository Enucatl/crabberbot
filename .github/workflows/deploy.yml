name: Build & Deploy

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      yt_dlp_commit_hash: ${{ steps.yt_dlp.outputs.commit_hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute git version
        id: version
        uses: Enucatl/docker-compose-security-baseline/.github/actions/git-version@main

      - name: Get yt-dlp latest commit hash
        id: yt_dlp
        shell: bash
        run: |
          set -euo pipefail
          hash="$(git ls-remote https://github.com/Enucatl/yt-dlp.git refs/heads/master | cut -f1)"
          echo "commit_hash=${hash}" >> "$GITHUB_OUTPUT"

  test:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      CARGO_PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo test
        run: cargo test --verbose

  docker:
    needs:
      - prepare
      - test
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: Enucatl/docker-compose-security-baseline/.github/workflows/docker-ci.yml@main
    with:
      image_name: ghcr.io/enucatl/crabberbot
      context: .
      dockerfile: Dockerfile
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
      build_args: |
        CARGO_PACKAGE_VERSION=${{ needs.prepare.outputs.version }}
        YT_DLP_COMMIT_HASH=${{ needs.prepare.outputs.yt_dlp_commit_hash }}
    secrets: inherit
